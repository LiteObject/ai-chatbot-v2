<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>App Builder Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="chat-region" aria-label="Chat">
        <header class="topbar">
          <div class="brand-block">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2 3 7l9 5 9-5-9-5Z" />
                <path d="m3 17 9 5 9-5" />
                <path d="m3 12 9 5 9-5" />
              </svg>
            </span>
            <div class="brand-copy">
              <h1>App Builder Chatbot</h1>
              <p id="statusText">Collecting requirements</p>
            </div>
          </div>
          <div class="topbar-actions">
            <span id="contextWindowBadge" class="context-window-badge" title="Estimated context used / configured window">Ctx - / -</span>
            <button id="newConversationButton" type="button" class="ghost-button">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 5v14" />
                <path d="M5 12h14" />
              </svg>
              <span>New</span>
            </button>
          </div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="composer">
          <label class="sr-only" for="messageInput">Message</label>
          <div class="composer-field">
            <textarea id="messageInput" rows="1" placeholder="Describe the app you want to build…"></textarea>
            <div class="composer-meta">
              <span class="composer-hint">Press <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to send</span>
              <button id="sendButton" type="submit" aria-label="Send message">
                <span>Send</span>
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M22 2 11 13" />
                  <path d="M22 2 15 22l-4-9-9-4 20-7Z" />
                </svg>
              </button>
            </div>
          </div>
        </form>
      </section>

      <aside class="spec-panel" aria-label="Current app specification">
        <div class="panel-header">
          <div class="panel-title">
            <h2>Current Spec</h2>
            <p class="panel-subtitle">Live summary of what we know</p>
          </div>
          <span id="conversationIdBadge" title="Conversation ID"></span>
        </div>
        <div class="panel-body">
          <section class="card spec-card" aria-label="Specification fields">
            <dl id="specDetails" class="spec-details"></dl>
          </section>
          <section class="card missing-section">
            <header class="card-header">
              <h3>Missing</h3>
              <span id="missingCount" class="card-pill">-</span>
            </header>
            <ul id="missingFields"></ul>
          </section>
          <section class="card metrics-section" aria-label="Runtime metrics">
            <header class="card-header">
              <h3>Metrics</h3>
              <span id="metricsUpdatedAt">-</span>
            </header>
            <dl id="metricsSummary" class="metrics-summary"></dl>
          </section>
        </div>
      </aside>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
